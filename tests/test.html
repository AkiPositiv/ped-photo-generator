<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Tests</title>
<style>body{font-family:monospace;padding:20px;} .pass{color:green} .fail{color:red;font-weight:bold}</style>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>
<h2>Unit Tests</h2>
<div id="out"></div>
<script type="module">
import { t, TRANSLATIONS } from '../js/i18n.js';
import { parseWorkbook } from '../js/excel_parser.js';
import { ANGLE_POOL, SCENE_TEMPLATES, assignAngles, buildPrompt } from '../js/prompt_builder.js';

const out = document.getElementById('out');
let pass = 0, fail = 0;
function assert(label, cond) {
  const el = document.createElement('div');
  if (cond) { el.className='pass'; el.textContent=`✅ ${label}`; pass++; }
  else       { el.className='fail'; el.textContent=`❌ ${label}`; fail++; }
  out.appendChild(el);
}

// Set lang to ru
localStorage.setItem('lang', 'ru');
assert('t(title) returns Russian string', t('title') === 'Генератор фото по пед нагрузке');
assert('t(btn_generate, {n:3}) interpolates', t('btn_generate', { n: 3 }) === 'Генерировать 3 фотографий');
assert('t(unknown_key) returns key itself', t('__no_such_key__') === '__no_such_key__');

localStorage.setItem('lang', 'uz');
assert('t(title) returns Uzbek string', t('title') === 'Ped yuklama asosida foto generator');

localStorage.setItem('lang', 'ru'); // reset

// excel_parser tests — uses XLSX global from CDN
// Build synthetic workbook
function makeTestWb() {
  const wb = XLSX.utils.book_new();

  // Yillik sheet: B6 = teacher name, G5 = academic year
  const yData = Array.from({ length: 10 }, () => Array(8).fill(''));
  yData[5][1] = 'Akbarov Xojiakbar'; // row 6, col B (0-indexed: row 5, col 1)
  yData[4][6] = '2025-2026';          // row 5, col G (0-indexed: row 4, col 6)
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(yData), 'Yillik');

  // S sheet (September): teaching row = 8 (0-indexed: 7)
  // Plan cols C-F (1-based 3-6, 0-based 2-5): 10,10,10,10 → sum 40
  // Real cols H-K (1-based 8-11, 0-based 7-10): 8,8,8,8 → sum 32
  const sData = Array.from({ length: 32 }, () => Array(12).fill(0));
  sData[7][2] = 10; sData[7][3] = 10; sData[7][4] = 10; sData[7][5] = 10;
  sData[7][7] = 8;  sData[7][8] = 8;  sData[7][9] = 8;  sData[7][10] = 8;
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sData), 'S');

  return wb;
}

const parsed = parseWorkbook(makeTestWb());
assert('teacherName parsed from B6', parsed.teacherName === 'Akbarov Xojiakbar');
assert('academicYear parsed', parsed.academicYear === '2025-2026');
assert('September teaching plan = 40', parsed.monthlyData?.S?.teaching?.plan === 40);
assert('September teaching real = 32', parsed.monthlyData?.S?.teaching?.real === 32);
assert('unknown month not in monthlyData', !parsed.monthlyData?.['Z']);

// prompt_builder tests
assert('ANGLE_POOL has 10 items', ANGLE_POOL.length === 10);
assert('SCENE_TEMPLATES has teaching', !!SCENE_TEMPLATES['teaching']);
assert('SCENE_TEMPLATES has all 17 keys', Object.keys(SCENE_TEMPLATES).length === 17);

const keys = ['teaching', 'consultations', 'open_lessons'];
const angles = assignAngles(keys);
assert('assignAngles returns entry for each key', keys.every(k => typeof angles[k] === 'string'));
assert('assignAngles angles come from ANGLE_POOL', keys.every(k => ANGLE_POOL.includes(angles[k])));

const p = buildPrompt('female', 'teaching', 'front-facing view, eye level');
assert('buildPrompt contains img token', p.startsWith('img,'));
assert('buildPrompt contains female teacher', p.includes('female teacher'));
assert('buildPrompt contains angle', p.includes('front-facing view, eye level'));
assert('buildPrompt contains vocational college', p.includes('vocational college'));

const summary = document.createElement('div');
summary.style = 'margin-top:16px;font-weight:bold';
summary.textContent = `${pass} passed, ${fail} failed`;
out.appendChild(summary);
</script>
</body>
</html>
